name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      # 仅保留 Ruby 环境，这是 Chirpy 运行的基础
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true # 利用缓存加速

      # 仅运行核心构建命令
      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 生成 Pagefind 全文搜索索引（以 main 为根以包含 h1 标题，排除文章元信息；站点 UI 为英文，故强制按中文切词）
      - name: Build search index (Pagefind)
        run: npx -y pagefind@latest --site "_site${{ steps.pages.outputs.base_path }}" --root-selector "main" --exclude-selectors ".post-meta" --force-language zh --verbose

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4