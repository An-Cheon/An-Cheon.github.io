name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建与部署合并为单个 job，省去第二个 runner 的启动/排队开销
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # posts-lastmod-hook 需要完整 git 历史
          submodules: recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      # 仅保留 Ruby 环境，这是 Chirpy 运行的基础
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true # 利用缓存加速

      # 跨构建复用 Jekyll 缓存：未改动文章的 Markdown 转换结果会被命中，
      # 增量提交时只需重新转换被修改的文章
      - name: Cache Jekyll build
        uses: actions/cache@v4
        with:
          path: .jekyll-cache
          key: jekyll-cache-${{ github.run_id }}
          restore-keys: |
            jekyll-cache-

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      # 生成 Pagefind 全文搜索索引（仅 /posts/ 文章页；只索引主文章标题+正文，
      # 排除日期/标签/版权/分享与相关文章；强制按中文切词）。
      # runner 自带 Node，pagefind 为独立 Rust 二进制，无需 actions/setup-node。
      - name: Build search index (Pagefind)
        run: npx -y pagefind@1 --site "_site${{ steps.pages.outputs.base_path }}" --glob "posts/**/*.html" --root-selector "article[data-toc]" --exclude-selectors ".post-meta,.post-tags,.post-tail-wrapper" --force-language zh

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
